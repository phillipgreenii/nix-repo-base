name: Update Flake Dependencies

# Thin caller of the reusable workflow defined in this same repo (bead pg2-wwpy9).
# The schedule stays local; everything else lives in update-flakes-reusable.yml.

on:
  schedule:
    # Run every Monday at 09:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-flakes
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for FlakeHub Cache OIDC auth when enabled

jobs:
  update-flakes:
    uses: ./.github/workflows/update-flakes-reusable.yml
    secrets: inherit
    with:
      automerge: squash
