name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nix-checks:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3
        with:
          # Trust exactly this flake's declared caches instead of blanket-accepting
          # any flake's (or input's) nixConfig via `accept-flake-config = true`.
          # Keep in sync with flake.nix nixConfig.extra-{substituters,trusted-public-keys}
          # (bead pg2-o817r).
          extra-conf: |
            extra-substituters = https://cache.numtide.com https://cache.flox.dev
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g= flox-cache-public-1:7F4OyH7ZCnFhcze3fJdfyXYLQw/aV7GEed86nQ7IsOs=

      - name: Setup Nix store cache
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
        with:
          ignore-missing-flake-lock: false
          fail-mode: true
          send-statistics: false

      - name: Check formatting with treefmt
        run: |
          nix fmt -- --ci

      - name: Run nix flake check
        run: nix flake check --show-trace -L

  # The tagged (//go:build smoke) end-to-end suite — the P1 gating-workforest
  # invariant plus the ~50 scenario-based verb tests — was previously reachable
  # only through `just pn-smoke`, so it never ran in CI (bead pg2-tu4yd). It
  # drives the built pn binary against bare git remotes in temp dirs and is
  # hermetic (self-supplied git identity, neutralized global/system git config);
  # nix-dependent scenarios self-skip when nix is absent, so it needs only git
  # (+ a Go toolchain to build pn). Kept a separate, Nix-free job so it stays
  # cheap and does not gate on the flake-check matrix.
  pn-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: modules/pn/go.mod
          cache-dependency-path: modules/pn/go.sum

      - name: Run pn smoke suite
        run: CGO_ENABLED=0 go test -tags=smoke ./internal/workspace/smoke/...
        working-directory: modules/pn
