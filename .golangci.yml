version: "2"

# golangci-lint v2 config. Pins the linter set so the git-hooks.nix
# golangci-lint pre-commit hook and any manual `golangci-lint run` agree.
# Uses the "standard" default linters (errcheck, govet, ineffassign,
# staticcheck, unused) explicitly.
linters:
  default: standard
  settings:
    errcheck:
      # Writes to stdout/stderr via fmt.Fprint* essentially never fail in a
      # CLI, and there is nothing actionable to do if they do; checking every
      # such call would add pervasive `_, _ =` noise. Exclude the whole family
      # rather than pepper the codebase. Best-effort cleanup errors (os.Remove,
      # Close in an error path) ARE handled explicitly at each call site.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
